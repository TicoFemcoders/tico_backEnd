# ── Database ─────────────────────────────────────────────────────────────────
# H2 en memoria en lugar de PostgreSQL para que @SpringBootTest arranque sin BD real.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ── Mail ─────────────────────────────────────────────────────────────────────
# Valores ficticios — el contexto solo necesita que las properties existan.
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=password

# ── JWT ──────────────────────────────────────────────────────────────────────
JWT_SECRET=test-secret-key-only-for-testing-purposes-must-be-long
JWT_EXPIRATION=86400000

# ── App ──────────────────────────────────────────────────────────────────────
app.mail.from=noreply@test.com
app.frontend.url=http://localhost:5173
app.cors.allowed-origins=http://localhost:5173
